<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Villa Laguna Nistrului</title>

  <!-- Более дорогой шрифт -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      background: #111;
      color: #fff;
      font-family: 'Inter', Arial, sans-serif;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      background:
        linear-gradient(rgba(0, 0, 0, 0.28), rgba(0, 0, 0, 0.42)),
        url('pool.jpg') center center / cover no-repeat;
    }

    .hero-content {
      max-width: 860px;
      width: 100%;
      padding: 36px 24px;
      background: rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 24px;
    }

    .subtitle,
    .description,
    .schedule {
      font-weight: 400;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.96);
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.18);
    }

    .subtitle {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .title {
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 9vw, 92px);
      line-height: 0.95;
      letter-spacing: 0.12em;
      font-weight: 600;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 3px 18px rgba(0, 0, 0, 0.22);
    }

    .description {
      max-width: 650px;
      margin: 28px auto 0;
      font-size: 19px;
    }

    .button-wrap {
      margin-top: 32px;
    }

    .whatsapp-button {
      display: inline-block;
      padding: 17px 34px;
      border-radius: 999px;
      background: #ffffff;
      color: #111111;
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
      transition: transform 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }

    .whatsapp-button:hover {
      transform: translateY(-2px);
      opacity: 0.96;
    }

    .schedule {
      margin-top: 16px;
      font-size: 16px;
    }

    @media (max-width: 768px) {
      .hero {
        padding: 24px 16px;
      }

      .hero-content {
        padding: 28px 18px;
        border-radius: 20px;
      }

      .subtitle {
        font-size: 16px;
        margin-bottom: 16px;
      }

      .description {
        font-size: 17px;
        margin-top: 22px;
      }

      .whatsapp-button {
        width: 100%;
        max-width: 320px;
        font-size: 16px;
        padding: 16px 24px;
      }

      .schedule {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-content">
      <div class="subtitle">Приватный отдых с подогреваемым бассейном у Днестра</div>

      <h1 class="title">Villa Laguna Nistrului</h1>

      <div class="description">
        Территория со всем необходимым для комфортного отдыха
      </div>

      <div class="button-wrap">
        <a
          class="whatsapp-button"
          href="https://wa.me/37379707595?text=%D0%97%D0%B4%D1%80%D0%B0%D0%B2%D1%81%D1%82%D0%B2%D1%83%D0%B9%D1%82%D0%B5%2C%20%D1%85%D0%BE%D1%87%D1%83%20%D0%B7%D0%B0%D0%B1%D1%80%D0%BE%D0%BD%D0%B8%D1%80%D0%BE%D0%B2%D0%B0%D1%82%D1%8C%20%D0%B4%D0%B0%D1%82%D1%83"
          target="_blank"
        >
          Забронировать дату
        </a>

        <div class="schedule">Ежедневно с 10:00 до 22:00</div>
      </div>
    </div>
  </section>
</body>
</html>
